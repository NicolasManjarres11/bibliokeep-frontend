<section class="space-y-4">
  <div>
    <h1 class="text-2xl font-semibold tracking-tight text-slate-900">Añadir libro</h1>
    <p class="mt-1 text-sm text-slate-600">
      Completa el formulario para registrar un nuevo libro en tu biblioteca.
    </p>
  </div>

  <app-book-form
    [loading]="isSubmitting()"
    [serverError]="submitError()"
    (submitBook)="onSubmit($event)"
    (cancel)="onCancel()"
  />
</section>
